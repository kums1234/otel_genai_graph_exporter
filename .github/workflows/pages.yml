name: pages

# Builds the static demo site from tools/build_static_site.py and
# deploys it to GitHub Pages on every push to main.
#
# One-time GitHub UI setup before this workflow can deploy:
#   1. Settings → Pages → "Build and deployment" Source = "GitHub Actions"
#   2. Settings → Actions → General → Workflow permissions = "Read and write"
# See docs/outreach/github-pages.md for the full walk-through.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages-deploy needs these scoped to the workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Skip queued duplicate runs but never cancel a deploy in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: pip install -e .
      - name: Build site
        run: python tools/build_static_site.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
