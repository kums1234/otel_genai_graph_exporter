name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── unit / mapper / synth / invariants ────────────────────────────────────
  unit:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: pip install -e ".[dev]"
      # Neo4j integration tests auto-skip when NEO4J_URI is unset.
      - name: Run test suite
        run: pytest -v --tb=short

  # ── integration with live Neo4j ───────────────────────────────────────────
  integration:
    name: pytest + Neo4j
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testtest
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testtest 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Wait for Neo4j auth (service-level healthcheck already gates start)
        run: |
          for i in {1..30}; do
            if nc -z localhost 7687; then echo "bolt open"; break; fi
            sleep 2
          done
      - name: Run Neo4j-gated tests
        env:
          NEO4J_URI:      bolt://localhost:7687
          NEO4J_USER:     neo4j
          NEO4J_PASSWORD: testtest
        run: pytest tests/test_neo4j_sink.py tests/test_exporter.py -v

  # ── lint (non-blocking for now; flip to required once the baseline is clean)
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install ruff
      - run: ruff check src tests
