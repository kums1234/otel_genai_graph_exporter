name: publish

# Publishes to PyPI on every v*.*.* tag push using PyPI Trusted Publisher
# (OIDC) — no API token stored in GitHub secrets. Register the Trusted
# Publisher on PyPI before the first automated run; see
# docs/outreach/pypi-release.md § 5a.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install --upgrade build twine
      - name: Build distributions
        run: python -m build
      - name: Verify long-description rendering
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/otel-genai-graph/
    permissions:
      id-token: write  # required for Trusted Publisher (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # State-machine extraction. The previous range expression
          # `/^## \[VERSION\]/,/^## \[/` produced a one-line range — both
          # patterns matched the version heading itself, so the range
          # collapsed and `sed '$d'` then stripped that single line,
          # yielding an empty file for every release. v0.2.0's release
          # body ended up as the "no CHANGELOG entry" placeholder despite
          # the entry being present.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; next }
            in_section && /^## \[/   { exit }
            in_section               { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          # If we found no content for this version, fall through to a
          # DRAFT release with a clear placeholder body. Drafts surface
          # in the Releases UI as "unpublished" — a much louder signal
          # than a published release with placeholder text.
          if [ ! -s /tmp/release-notes.md ]; then
            cat > /tmp/release-notes.md <<EOF
          _No CHANGELOG.md entry for **$VERSION** at tag time — release was auto-created as a **draft**.
          Edit the body and publish from the Releases UI, or run
          \`gh release edit v$VERSION --notes-file release-notes/$VERSION.md --draft=false\`._
          EOF
            echo "draft=true"  >> "$GITHUB_OUTPUT"
          else
            echo "draft=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.notes.outputs.version }}
          body_path: /tmp/release-notes.md
          files: dist/*
          draft: ${{ steps.notes.outputs.draft }}
          prerelease: ${{ contains(github.ref_name, '-') }}
